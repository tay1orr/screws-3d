<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#73c9f4">
  <meta name="description" content="색깔 나사를 맞는 상자에 모아 구조물을 분해하는 3D 퍼즐 게임">
  <title>Screwdom 3D</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="canvas" aria-label="Screwdom 3D 게임 화면"></canvas>
  <div id="bin-view" aria-label="나사 수집 상자와 임시 보관함"></div>

  <div id="hud">
    <button id="menu" class="icon-btn-sm" title="메뉴" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <rect x="3" y="5" width="18" height="2.5" rx="1" fill="currentColor"/>
        <rect x="3" y="11" width="18" height="2.5" rx="1" fill="currentColor"/>
        <rect x="3" y="17" width="18" height="2.5" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <button id="hint-button" class="hint-button" type="button" aria-label="힌트 보기">
      <span aria-hidden="true">💡</span><span>힌트</span>
    </button>

    <div id="screw-count" aria-label="남은 나사 수">
      <div class="screw-icon" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none">
          <ellipse cx="16" cy="10" rx="9" ry="5" fill="#ffd542" stroke="#2a2a3a" stroke-width="2"/>
          <path d="M7 10 L9 22 L23 22 L25 10" fill="#ffb43a" stroke="#2a2a3a" stroke-width="2" stroke-linejoin="round"/>
          <path d="M12 23 L13 30 L19 30 L20 23" fill="#ffd542" stroke="#2a2a3a" stroke-width="2" stroke-linejoin="round"/>
          <line x1="12" y1="10" x2="20" y2="10" stroke="#2a2a3a" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span id="screw-count-text">0 / 0</span>
    </div>
    <div id="hint" role="status" aria-live="polite" aria-hidden="true">화면을 드래그해 돌리고, 꺼낼 수 있는 나사를 누르세요</div>
  </div>

  <div id="pause-panel" class="hidden" role="dialog" aria-modal="true" aria-labelledby="pause-level-label">
    <div class="pause-card">
      <h2 id="pause-level-label">Level 1</h2>
      <button id="pause-resume" class="primary-btn">계속하기</button>
      <button id="pause-restart" class="secondary-btn">레벨 다시 시작</button>
      <button id="pause-next" class="secondary-btn" disabled>다음 레벨</button>
      <button id="pause-levels" class="secondary-btn" type="button">레벨 선택</button>
      <button id="creator-trigger" class="creator-btn" type="button">
        제작자: taylorr <span aria-hidden="true">♥</span>
      </button>
    </div>
  </div>

  <div id="creator-panel" class="hidden" role="dialog" aria-modal="true" aria-labelledby="creator-title">
    <form id="creator-form" class="secret-card" autocomplete="off">
      <button id="creator-close" class="secret-close" type="button" aria-label="날짜 입력 닫기">×</button>
      <div class="secret-heart" aria-hidden="true">♥</div>
      <h2 id="creator-title">날짜를 입력하세요</h2>
      <p>우리만 아는 여덟 자리 날짜</p>
      <input id="creator-date" name="creator-date" type="text" inputmode="text" pattern="[A-Za-z0-9]*" maxlength="8" placeholder="YYYYMMDD" aria-describedby="creator-message">
      <button class="primary-btn secret-submit" type="submit">확인</button>
      <p id="creator-message" class="secret-message" aria-live="polite"></p>
    </form>
  </div>

  <div id="heart-party" aria-hidden="true"></div>

  <div id="level-panel" class="hidden" role="dialog" aria-modal="true" aria-labelledby="level-panel-title">
    <div class="level-panel-card">
      <button id="level-panel-close" class="secret-close" type="button" aria-label="레벨 선택 닫기">×</button>
      <h2 id="level-panel-title">레벨 선택</h2>
      <p>완료하면 다음 퍼즐이 열려요.</p>
      <div id="level-grid"></div>
    </div>
  </div>

  <div id="overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
    <div class="overlay-card">
      <div id="overlay-emoji">🎉</div>
      <h1 id="overlay-title">Level Complete!</h1>
      <p id="overlay-msg">모든 나사를 정리했어요!</p>
      <button id="overlay-btn" class="primary-btn">계속</button>
    </div>
  </div>

  <div id="splash" aria-hidden="false">
    <div class="splash-card">
      <div class="splash-icon" aria-hidden="true">
        <div class="splash-screw"></div>
        <div class="splash-screw"></div>
        <div class="splash-screw"></div>
      </div>
      <h1>Screwdom 3D</h1>
      <p>색깔 나사를 모아 구조물을 분해하세요</p>
      <button id="start-btn" class="primary-btn">시작하기</button>
      <button id="splash-levels" class="splash-levels-btn" type="button">레벨 선택</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
