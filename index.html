<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1326">
<title>Screws 3D</title>
<link rel="stylesheet" href="styles.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="top-bar">
    <button id="restart" class="icon-btn" title="다시 시작">↻</button>
    <div id="level-label">Level 1</div>
    <button id="next" class="icon-btn" title="다음 레벨" disabled>›</button>
  </div>

  <div id="screw-count">
    <div class="screw-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <ellipse cx="16" cy="10" rx="10" ry="6" fill="#ffd542" stroke="#2a2a3a" stroke-width="2"/>
        <path d="M6 10 L8 22 L24 22 L26 10" fill="#ffb43a" stroke="#2a2a3a" stroke-width="2" stroke-linejoin="round"/>
        <path d="M11 23 L13 30 L19 30 L21 23" fill="#ffd542" stroke="#2a2a3a" stroke-width="2" stroke-linejoin="round"/>
        <line x1="11" y1="10" x2="21" y2="10" stroke="#2a2a3a" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <span id="screw-count-text">0 / 0</span>
  </div>
  <div id="hint">화면을 드래그하면 회전 · 나사를 탭하면 풀어요</div>
</div>

<div id="overlay" class="hidden">
  <div class="overlay-card">
    <div id="overlay-emoji">🎉</div>
    <h1 id="overlay-title">Level Complete!</h1>
    <p id="overlay-msg">잘했어요!</p>
    <button id="overlay-btn" class="primary-btn">계속</button>
  </div>
</div>

<div id="splash">
  <div class="splash-card">
    <div class="splash-icon">
      <div class="splash-screw"></div>
      <div class="splash-screw"></div>
      <div class="splash-screw"></div>
    </div>
    <h1>Screws 3D</h1>
    <p>나사를 풀어 모든 판자를 분해하세요</p>
    <button id="start-btn" class="primary-btn">시작하기</button>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
